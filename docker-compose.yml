services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ado-pipeline-comparator:dev
    container_name: ado-pipeline-comparator
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_PATH=/app/data/data.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env or environment}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
